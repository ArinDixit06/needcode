name: Keep Server Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier from spinning down
    # Render sleeps after 15 minutes of inactivity
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  ping:
    name: Ping Server
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Server Health Check
        run: |
          echo "⏰ Pinging server at $(date -u)"

          HTTP_STATUS=$(curl --silent --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            "${{ secrets.RENDER_SERVER_URL }}/api/auth/status")

          echo "📡 Response status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Server is alive and responding!"
          else
            echo "⚠️ Server returned unexpected status: $HTTP_STATUS"
            exit 1
          fi
